<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Rice</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <canvas id="canvas"></canvas>
    <div id="output"></div>
    <div id="upgs">
      <h3>upgrades</h3>
      <button id="autoclicker">autoclicker (200 pts)</button><br>
      <button id="multiplier">multiplier (300 pts)</button><br>
      <button id="abowl">add bowl (100 pts)</button><button id="aapbowl">Buy all</button>
      <div id="consumer">
        <h3>consumers</h3>
        Income: <span id="income">0</span> pts/s<br>
        Eaten: <span id="eaten">0</span> grains out of <span id="total">0</span><br>
        <ul>
          <li>person 1: <span id="person1">30</span> grains/s</li>
          <li><button id="buy1">Add person - 500 points</button><br></li>
          <li><button id="buy2">Add Mexican - 1500 points</button><br></li>
          <li><button id="buy3">Add Japanese - 2500 points</button><br></li>
          <li><button id="buy4">Add Asian - 5000 points</button><br></li>
        </ul>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
