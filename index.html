<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Rice</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
    <canvas id="canvas"></canvas>
    <div id="output"></div>
    <div id="upgs">
      <h3>upgrades</h3>
      <button id="autoclicker">autoclicker (200 pts)</button><br>
      <button id="multiplier">multiplier (300 pts)</button><br>
      <button id="abowl">add bowl (100 pts)</button><button id="aapbowl">Buy all</button>
      <button id="vaccum">vacuum (1000 pts)</button><br>
      <div id="consumer">
        <h3>consumers</h3>
        Grains: <span id="total">0</span><br>
        <ul>
          <li>base person: <span id="person1">30</span> grains/s <button id="sell">Sell - 500 points</button></li>
          <li><button id="buy1">Add person - 500 points</button><br></li>
          <li><button id="buy2">Add Mexican - 1500 points</button><br></li>
          <li><button id="buy3">Add Japanese - 2500 points</button><br></li>
          <li><button id="buy4">Add Asian - 5000 points</button><br></li>
          <li><button id="buy5">Add Steven He - 100000 points</button><br></li>
          <li><button id="buy6">Add Uncle Roger - 1000000 points</button><br></li>
        </ul>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
